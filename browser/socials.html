<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script type="text/javascript" src="./main.js"></script>
    <title>Social Media Overlay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="th-fg">
    <div id="container">
        <div id="box" class="th-fg th-bg">
            <p id="label" class="th-accent-text mx-2">Follow</p>
            <i id="icon" class=""></i>
            <p id="username" class="th-fg mx-2">@YourHandle</p>
        </div>
    </div>
    <!--  -->
    <style>
    #box {
        display: flex;
        padding: 10px 20px;
        border-left: 5px solid var(--th-accent);
        border-radius: 4px;
        font-size: 24px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    </style>
    <script>
        function socialrotation(){
            if(!user) return;
            document.getElementById('username').innerText = '@' + user.username;
            document.getElementById('container').style = 'display:flex;align-items:flex-start;padding:20px;';
            let index = 0;
            const box = document.getElementById('box');
            const icon = document.getElementById('icon');
            setInterval(() =>
            {
                const socials = Object.keys(user.socials);
                box.style.animation = 'slideOut 0.5s ease-in forwards';
                setTimeout(() =>
                {
                    index = (index+1) % socials.length;
                    icon.className = user.socials[socials[index]].icon;
                    box.style.animation = 'slideIn 0.5s ease-out forwards';

                },500);
            },10000);
        }
    </script>
</body>
</html>
