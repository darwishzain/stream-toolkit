<!DOCTYPE html>
<html>
<head>
    <title>Twitch Chat for OBS</title>
    <script type="text/javascript" src="./lib/tmi.min.js"></script>
    <link rel="stylesheet" href="./lib/style.css">
    <script type="text/javascript" src="./lib/main.js"></script>
</head>
<body class="th-fg">
    <div id="container" class=""></div>
    <style>
    </style>
    <script>
        function tmichat(){
            if(!user) return;
            // Set your channel name here

            const channelName = user.username;
            const client = new tmi.Client({
                channels: [ channelName ]
            });

            const container = document.getElementById('container');
            client.on('message', (channel, tags, message, self) => {
                const bubble = document.createElement('div');
                bubble.className = 'tc-message th-bg d-flex align-items-center gap-2 m-2';
                bubble.classList.add();
                bubble.innerHTML = `<span class="th-accent-text tc-user mb-0 fw-bold">${tags['display-name']}:</span> <span class="mb-0">${message}</span>`;
                container.appendChild(bubble);
                if (container.children.length > 50) {
                    container.removeChild(container.firstChild);
                }
                // Auto-scroll to bottom
                window.scrollTo(0, document.body.scrollHeight);
            });

            client.connect();
        }
    </script>
</body>
</html>
